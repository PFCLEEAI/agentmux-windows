name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  core:
    name: Core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore tests/AgentMux.Tests/AgentMux.Tests.csproj
      - name: Test
        run: dotnet test tests/AgentMux.Tests/AgentMux.Tests.csproj -c Release --no-restore

  windows-build:
    name: Windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore AgentMux.sln
      - name: Build
        run: dotnet build AgentMux.sln -c Release --no-restore
      - name: Test
        run: dotnet test tests/AgentMux.Tests/AgentMux.Tests.csproj -c Release --no-build
      - name: Windows app smoke
        run: dotnet test tests/AgentMux.App.Tests/AgentMux.App.Tests.csproj -c Release --no-build
        env:
          AGENTMUX_SMOKE_ARTIFACT_DIR: ${{ runner.temp }}\agentmux-smoke-artifacts
      - name: Upload Windows app smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-smoke-artifacts
          path: ${{ runner.temp }}\agentmux-smoke-artifacts
          if-no-files-found: ignore
      - name: Windows ConPTY smoke
        run: dotnet test tests/AgentMux.Windows.Tests/AgentMux.Windows.Tests.csproj -c Release --no-build
      - name: Publish Windows package
        run: |
          $package = "${{ runner.temp }}\agentmux-windows-package"
          if (Test-Path $package) {
            Remove-Item -Recurse -Force $package
          }

          New-Item -ItemType Directory -Force -Path $package | Out-Null
          $cliPackage = Join-Path $package "cli"
          New-Item -ItemType Directory -Force -Path $cliPackage | Out-Null

          dotnet publish src/AgentMux.Win.App/AgentMux.Win.App.csproj -c Release --no-build -o $package
          dotnet publish src/AgentMux.Cli/AgentMux.Cli.csproj -c Release --no-build -o $cliPackage
          Get-ChildItem $package -Recurse -Include *.pdb,*.xml | Remove-Item -Force
          Copy-Item README.md $package
          Copy-Item LICENSE $package

          $requiredFiles = @(
            "AgentMux.exe",
            "AgentMux.dll",
            "AgentMux.runtimeconfig.json",
            "AgentMux.deps.json",
            "cli\agentmux.exe",
            "cli\agentmux.dll",
            "cli\agentmux.runtimeconfig.json",
            "cli\agentmux.deps.json",
            "AgentMux.Core.dll",
            "AgentMux.Win.Pty.dll",
            "Assets\Terminal\terminal.html",
            "Assets\Terminal\vendor\xterm\xterm.css",
            "Assets\Terminal\vendor\xterm\xterm.js",
            "Microsoft.Web.WebView2.Core.dll",
            "Microsoft.Web.WebView2.Wpf.dll",
            "Microsoft.Windows.SDK.NET.dll",
            "WinRT.Runtime.dll",
            "runtimes\win-x64\native\WebView2Loader.dll",
            "README.md",
            "LICENSE",
            "PACKAGE.json",
            "SHA256SUMS.txt"
          )

          $manifest = [ordered]@{
            name = "AgentMux Windows"
            packageKind = "framework-dependent"
            commit = "${{ github.sha }}"
            runId = "${{ github.run_id }}"
            runNumber = "${{ github.run_number }}"
            runAttempt = "${{ github.run_attempt }}"
            builtAtUtc = (Get-Date).ToUniversalTime().ToString("o")
            app = "AgentMux.exe"
            cli = "cli\agentmux.exe"
            requires = @(".NET 9 Desktop Runtime", "WebView2 Runtime")
            requiredFiles = $requiredFiles
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Encoding UTF8 (Join-Path $package "PACKAGE.json")

          $hashes = Get-ChildItem $package -Recurse -File |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            Sort-Object FullName |
            ForEach-Object {
              $relative = [System.IO.Path]::GetRelativePath($package, $_.FullName).Replace("\", "/")
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $relative"
            }
          $hashes | Set-Content -Encoding ASCII (Join-Path $package "SHA256SUMS.txt")

          foreach ($file in $requiredFiles) {
            $path = Join-Path $package $file
            if (-not (Test-Path $path)) {
              throw "Missing package file: $file"
            }
          }

          $cliHelp = & (Join-Path $package "cli\agentmux.exe") --help
          if ($LASTEXITCODE -ne 0 -or ($cliHelp -join "`n") -notmatch "agentmux - CLI") {
            throw "Packaged CLI smoke failed."
          }

          Get-ChildItem $package | Sort-Object Name | Select-Object Name,Length
      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: agentmux-windows-package
          path: ${{ runner.temp }}\agentmux-windows-package
          if-no-files-found: error
