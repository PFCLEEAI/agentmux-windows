name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  core:
    name: Core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore tests/AgentMux.Tests/AgentMux.Tests.csproj
      - name: Test
        run: dotnet test tests/AgentMux.Tests/AgentMux.Tests.csproj -c Release --no-restore

  windows-build:
    name: Windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore AgentMux.sln
      - name: Build
        run: dotnet build AgentMux.sln -c Release --no-restore
      - name: Test
        run: dotnet test tests/AgentMux.Tests/AgentMux.Tests.csproj -c Release --no-build
      - name: Windows app smoke
        run: dotnet test tests/AgentMux.App.Tests/AgentMux.App.Tests.csproj -c Release --no-build
        env:
          AGENTMUX_SMOKE_ARTIFACT_DIR: ${{ runner.temp }}\agentmux-smoke-artifacts
      - name: Upload Windows app smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-smoke-artifacts
          path: ${{ runner.temp }}\agentmux-smoke-artifacts
          if-no-files-found: ignore
      - name: Windows ConPTY smoke
        run: dotnet test tests/AgentMux.Windows.Tests/AgentMux.Windows.Tests.csproj -c Release --no-build
      - name: Publish Windows package
        shell: pwsh
        run: |
          .\tools\package-windows.ps1 `
            -OutputPath "${{ runner.temp }}\agentmux-windows-package" `
            -Configuration Release `
            -Commit "${{ github.sha }}" `
            -RunId "${{ github.run_id }}" `
            -RunNumber "${{ github.run_number }}" `
            -RunAttempt "${{ github.run_attempt }}" `
            -NoBuild
      - name: Verify package evidence manifest
        shell: pwsh
        run: |
          $packageRoot = "${{ runner.temp }}\agentmux-windows-package"
          $manifest = Get-Content (Join-Path $packageRoot "PACKAGE.json") -Raw | ConvertFrom-Json
          $evidence = Get-Content (Join-Path $packageRoot "EVIDENCE.json") -Raw | ConvertFrom-Json

          if ($manifest.requiredFiles -notcontains "EVIDENCE.json") {
            throw "PACKAGE.json requiredFiles does not include EVIDENCE.json."
          }
          if ($manifest.requiredFiles -notcontains "tools\verify-manual-desktop-evidence.ps1") {
            throw "PACKAGE.json requiredFiles does not include the manual evidence verifier."
          }
          if ($evidence.provenance.commit -ne "${{ github.sha }}") {
            throw "EVIDENCE.json commit does not match this workflow run."
          }
          if ($evidence.provenance.runId -ne "${{ github.run_id }}") {
            throw "EVIDENCE.json runId does not match this workflow run."
          }
          if ($evidence.integrity.checksumFile -ne "SHA256SUMS.txt") {
            throw "EVIDENCE.json integrity.checksumFile should be SHA256SUMS.txt."
          }
          if ($evidence.integrity.coverage -ne "all package files except root SHA256SUMS.txt") {
            throw "EVIDENCE.json integrity.coverage is not the expected root-checksum exception."
          }
          if ($evidence.manualGate.status -ne "required") {
            throw "EVIDENCE.json manualGate.status should remain required."
          }
          if ($evidence.manualGate.verifier -ne "tools/verify-manual-desktop-evidence.ps1") {
            throw "EVIDENCE.json manualGate.verifier should name the packaged verifier."
          }
          if ($evidence.releaseReadiness.status -ne "blocked") {
            throw "EVIDENCE.json releaseReadiness.status should remain blocked until real desktop smoke passes."
          }
          if (-not (Get-Content (Join-Path $packageRoot "SHA256SUMS.txt") | Where-Object { $_ -match "  EVIDENCE\.json$" })) {
            throw "SHA256SUMS.txt does not cover EVIDENCE.json."
          }
      - name: Manual desktop smoke helper preflight
        shell: pwsh
        run: |
          & "${{ runner.temp }}\agentmux-windows-package\tools\manual-desktop-smoke.ps1" `
            -PackagePath "${{ runner.temp }}\agentmux-windows-package" `
            -EvidenceRoot "${{ runner.temp }}\manual-desktop-smoke-helper" `
            -SkipLaunch
      - name: Manual desktop evidence verifier preflight
        shell: pwsh
        run: |
          $reportPath = "${{ runner.temp }}\manual-desktop-smoke-helper-verification.json"
          & "${{ runner.temp }}\agentmux-windows-package\tools\verify-manual-desktop-evidence.ps1" `
            -EvidencePath "${{ runner.temp }}\manual-desktop-smoke-helper" `
            -PackagePath "${{ runner.temp }}\agentmux-windows-package" `
            -ReportPath "$reportPath" `
            -PreflightOnly

          $report = Get-Content $reportPath -Raw | ConvertFrom-Json
          if ($report.status -ne "passed") {
            throw "Manual evidence verifier preflight did not pass."
          }
          if ($report.mode -ne "preflight") {
            throw "Manual evidence verifier must run in preflight mode in CI."
          }
          if (-not $report.packageIntegrityVerified) {
            throw "Manual evidence verifier did not verify package integrity."
          }
          if (-not $report.helperEvidencePacketVerified) {
            throw "Manual evidence verifier did not verify helper evidence packet shape."
          }
          if (-not $report.manualGateStillRequired -or -not $report.releaseReadinessStillBlocked) {
            throw "Manual evidence verifier must preserve the manual-gate/release-readiness boundary."
          }
      - name: User install helper preflight
        shell: pwsh
        run: |
          $userPathBefore = [Environment]::GetEnvironmentVariable("Path", [EnvironmentVariableTarget]::User)
          $installRoot = "${{ runner.temp }}\agentmux-user-install"
          & "${{ runner.temp }}\agentmux-windows-package\tools\install-user.ps1" `
            -PackagePath "${{ runner.temp }}\agentmux-windows-package" `
            -InstallRoot "$installRoot" `
            -SkipPathUpdate

          $userPathAfter = [Environment]::GetEnvironmentVariable("Path", [EnvironmentVariableTarget]::User)
          if ($userPathBefore -ne $userPathAfter) {
            throw "install-user.ps1 changed the user PATH even though -SkipPathUpdate was set."
          }

          foreach ($file in @("bin\agentmux.cmd", "bin\agentmux-app.cmd", "INSTALL.json")) {
            if (-not (Test-Path (Join-Path $installRoot $file))) {
              throw "Installed helper output is missing: $file"
            }
          }

          $shimHelp = & (Join-Path $installRoot "bin\agentmux.cmd") --help
          if ($LASTEXITCODE -ne 0 -or ($shimHelp -join "`n") -notmatch "agentmux - CLI") {
            throw "Installed agentmux.cmd shim smoke failed."
          }

          $tamperedPackage = "${{ runner.temp }}\agentmux-tampered-package"
          if (Test-Path $tamperedPackage) {
            Remove-Item -Recurse -Force $tamperedPackage
          }
          New-Item -ItemType Directory -Force -Path $tamperedPackage | Out-Null
          Copy-Item -Path "${{ runner.temp }}\agentmux-windows-package\*" -Destination $tamperedPackage -Recurse -Force
          Add-Content -LiteralPath (Join-Path $tamperedPackage "README.md") -Value "tamper"

          try {
            & (Join-Path $tamperedPackage "tools\install-user.ps1") `
              -PackagePath $tamperedPackage `
              -InstallRoot "${{ runner.temp }}\agentmux-tampered-install" `
              -SkipPathUpdate
            throw "Tampered package unexpectedly installed."
          } catch {
            if ($_.Exception.Message -eq "Tampered package unexpectedly installed.") {
              throw
            }
            Write-Host "Tampered package install was blocked: $($_.Exception.Message)"
          }
      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: agentmux-windows-package
          path: ${{ runner.temp }}\agentmux-windows-package
          if-no-files-found: error
