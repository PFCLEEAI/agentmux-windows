name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release-assets:
    name: Build Windows release assets
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      PACKAGE_NAME: agentmux-windows-package
      RELEASE_NAME: agentmux-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore AgentMux.sln
      - name: Build
        run: dotnet build AgentMux.sln -c Release --no-restore
      - name: Test
        run: dotnet test tests/AgentMux.Tests/AgentMux.Tests.csproj -c Release --no-build
      - name: Windows app smoke
        run: dotnet test tests/AgentMux.App.Tests/AgentMux.App.Tests.csproj -c Release --no-build
        env:
          AGENTMUX_SMOKE_ARTIFACT_DIR: ${{ runner.temp }}\agentmux-smoke-artifacts
      - name: Upload Windows app smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-smoke-artifacts
          path: ${{ runner.temp }}\agentmux-smoke-artifacts
          if-no-files-found: ignore
      - name: Windows ConPTY smoke
        run: dotnet test tests/AgentMux.Windows.Tests/AgentMux.Windows.Tests.csproj -c Release --no-build
      - name: Resolve package version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $releaseTag = ""

          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}".StartsWith("refs/tags/")) {
            $releaseTag = "${{ github.ref_name }}"
          }

          if ([string]::IsNullOrWhiteSpace($version) -or $version -eq "main") {
            $version = "manual-${{ github.run_number }}"
          }

          $safeVersion = $version -replace "[^0-9A-Za-z._-]", "-"
          "AGENTMUX_RELEASE_VERSION=$safeVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AGENTMUX_RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AGENTMUX_ASSET_BASE=agentmux-windows-$safeVersion-framework-dependent" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PACKAGE_DIR=$env:RUNNER_TEMP\$env:PACKAGE_NAME" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_DIR=$env:RUNNER_TEMP\$env:RELEASE_NAME" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Publish Windows package
        shell: pwsh
        run: |
          .\tools\package-windows.ps1 `
            -OutputPath "$env:PACKAGE_DIR" `
            -Configuration Release `
            -Commit "${{ github.sha }}" `
            -RunId "${{ github.run_id }}" `
            -RunNumber "${{ github.run_number }}" `
            -RunAttempt "${{ github.run_attempt }}" `
            -ReleaseTag "$env:AGENTMUX_RELEASE_TAG" `
            -AssetBase "$env:AGENTMUX_ASSET_BASE" `
            -PackageLayout "zip-root" `
            -NoBuild
      - name: Manual desktop smoke helper preflight
        shell: pwsh
        run: |
          & "$env:PACKAGE_DIR\tools\manual-desktop-smoke.ps1" `
            -PackagePath "$env:PACKAGE_DIR" `
            -EvidenceRoot "$env:RUNNER_TEMP\manual-desktop-smoke-helper" `
            -SkipLaunch
      - name: User install helper preflight
        shell: pwsh
        run: |
          $userPathBefore = [Environment]::GetEnvironmentVariable("Path", [EnvironmentVariableTarget]::User)
          $installRoot = "$env:RUNNER_TEMP\agentmux-user-install"
          & "$env:PACKAGE_DIR\tools\install-user.ps1" `
            -PackagePath "$env:PACKAGE_DIR" `
            -InstallRoot "$installRoot" `
            -SkipPathUpdate

          $userPathAfter = [Environment]::GetEnvironmentVariable("Path", [EnvironmentVariableTarget]::User)
          if ($userPathBefore -ne $userPathAfter) {
            throw "install-user.ps1 changed the user PATH even though -SkipPathUpdate was set."
          }

          foreach ($file in @("bin\agentmux.cmd", "bin\agentmux-app.cmd", "INSTALL.json")) {
            if (-not (Test-Path (Join-Path $installRoot $file))) {
              throw "Installed helper output is missing: $file"
            }
          }

          $shimHelp = & (Join-Path $installRoot "bin\agentmux.cmd") --help
          if ($LASTEXITCODE -ne 0 -or ($shimHelp -join "`n") -notmatch "agentmux - CLI") {
            throw "Installed agentmux.cmd shim smoke failed."
          }
      - name: Create release ZIP and checksum
        shell: pwsh
        run: |
          if (Test-Path $env:RELEASE_DIR) {
            Remove-Item -Recurse -Force $env:RELEASE_DIR
          }

          New-Item -ItemType Directory -Force -Path $env:RELEASE_DIR | Out-Null
          $zipPath = Join-Path $env:RELEASE_DIR "$env:AGENTMUX_ASSET_BASE.zip"

          Compress-Archive `
            -Path (Join-Path $env:PACKAGE_DIR "*") `
            -DestinationPath $zipPath `
            -CompressionLevel Optimal

          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          [System.IO.File]::WriteAllText(
            "$zipPath.sha256",
            "$hash  $(Split-Path -Leaf $zipPath)`n",
            [System.Text.Encoding]::ASCII)

          Get-ChildItem $env:RELEASE_DIR | Sort-Object Name | Select-Object Name,Length
      - name: Smoke release ZIP layout
        shell: pwsh
        run: |
          $zipPath = Join-Path $env:RELEASE_DIR "$env:AGENTMUX_ASSET_BASE.zip"
          $smokeDir = Join-Path $env:RUNNER_TEMP "agentmux-release-smoke"

          if (Test-Path $smokeDir) {
            Remove-Item -Recurse -Force $smokeDir
          }

          Expand-Archive $zipPath -DestinationPath $smokeDir -Force

          if (Test-Path (Join-Path $smokeDir "agentmux-windows-package")) {
            throw "Release ZIP contains an extra package parent folder."
          }

          foreach ($file in @("AgentMux.exe", "cli\agentmux.exe", "PACKAGE.json", "EVIDENCE.json", "SHA256SUMS.txt", "tools\install-user.ps1")) {
            if (-not (Test-Path (Join-Path $smokeDir $file))) {
              throw "Release ZIP missing root file: $file"
            }
          }

          $manifest = Get-Content (Join-Path $smokeDir "PACKAGE.json") -Raw | ConvertFrom-Json
          $evidence = Get-Content (Join-Path $smokeDir "EVIDENCE.json") -Raw | ConvertFrom-Json
          if ($manifest.commit -ne "${{ github.sha }}") {
            throw "PACKAGE.json commit does not match this workflow run."
          }
          if ($manifest.runId -ne "${{ github.run_id }}") {
            throw "PACKAGE.json runId does not match this workflow run."
          }
          if ($evidence.provenance.commit -ne "${{ github.sha }}") {
            throw "EVIDENCE.json commit does not match this workflow run."
          }
          if ($evidence.provenance.runId -ne "${{ github.run_id }}") {
            throw "EVIDENCE.json runId does not match this workflow run."
          }
          if ($evidence.assetBase -ne $env:AGENTMUX_ASSET_BASE) {
            throw "EVIDENCE.json assetBase does not match release asset base."
          }
          if ($evidence.packageLayout -ne "zip-root") {
            throw "EVIDENCE.json packageLayout should be zip-root for release assets."
          }
          if ($evidence.integrity.checksumFile -ne "SHA256SUMS.txt") {
            throw "EVIDENCE.json integrity.checksumFile should be SHA256SUMS.txt."
          }
          if ($evidence.releaseReadiness.status -ne "blocked") {
            throw "EVIDENCE.json releaseReadiness.status should remain blocked until real desktop smoke passes."
          }

          $cliHelp = & (Join-Path $smokeDir "cli\agentmux.exe") --help
          if ($LASTEXITCODE -ne 0 -or ($cliHelp -join "`n") -notmatch "agentmux - CLI") {
            throw "Release ZIP CLI smoke failed."
          }

          foreach ($line in Get-Content (Join-Path $smokeDir "SHA256SUMS.txt")) {
            if ([string]::IsNullOrWhiteSpace($line)) {
              continue
            }

            $parts = $line -split "  ", 2
            if ($parts.Length -ne 2) {
              throw "Invalid checksum line: $line"
            }

            $relativePath = $parts[1].Replace("/", [System.IO.Path]::DirectorySeparatorChar)
            $path = Join-Path $smokeDir $relativePath
            if (-not (Test-Path $path)) {
              throw "Checksum file entry is missing from ZIP: $($parts[1])"
            }

            $actual = (Get-FileHash $path -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -ne $parts[0]) {
              throw "Checksum mismatch for $($parts[1])"
            }
          }

          $zipInstallRoot = Join-Path $env:RUNNER_TEMP "agentmux-release-zip-install"
          & (Join-Path $smokeDir "tools\install-user.ps1") `
            -PackagePath $smokeDir `
            -InstallRoot $zipInstallRoot `
            -SkipPathUpdate

          $zipShimHelp = & (Join-Path $zipInstallRoot "bin\agentmux.cmd") --help
          if ($LASTEXITCODE -ne 0 -or ($zipShimHelp -join "`n") -notmatch "agentmux - CLI") {
            throw "Release ZIP installed agentmux.cmd shim smoke failed."
          }
      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentmux-windows-release
          path: ${{ runner.temp }}\agentmux-release
          if-no-files-found: error

  publish-prerelease:
    name: Publish GitHub prerelease
    needs: build-release-assets
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release package artifact
        uses: actions/download-artifact@v4
        with:
          name: agentmux-windows-release
          path: release-assets
      - name: Create or update GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          cat > release-notes.md <<'EOF'
          Pre-alpha framework-dependent AgentMux Windows package.

          Requires:
          - .NET 9 Desktop Runtime
          - Microsoft Edge WebView2 Runtime

          This is a smoke-ready preview package with a lightweight no-admin user install helper. It is not signed, MSIX-packaged, or release-ready. Manual Windows desktop QA is still required before release-ready status.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --title "AgentMux Windows $RELEASE_TAG" \
              --notes-file release-notes.md \
              --prerelease
          fi
