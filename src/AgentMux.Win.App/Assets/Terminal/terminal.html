<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" />
  <link rel="stylesheet" href="vendor/xterm/xterm.css" />
  <style>
    html, body, #terminal {
      height: 100%;
      width: 100%;
      margin: 0;
      background: #0f131a;
      overflow: hidden;
    }

    .xterm {
      height: 100%;
      padding: 8px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="vendor/xterm/xterm.js"></script>
  <script>
    const terminal = new Terminal({
      convertEol: true,
      cursorBlink: true,
      fontFamily: 'Consolas, "Cascadia Mono", "Courier New", monospace',
      fontSize: 13,
      theme: {
        background: '#0f131a',
        foreground: '#eef2f8',
        cursor: '#3aa7ff',
        selectionBackground: '#265d8c'
      }
    });

    let hasOutput = false;
    const emptyText = 'No terminal output yet.';
    let smokeScreenText = emptyText;
    let writeQueue = Promise.resolve();

    const writeAsync = text => new Promise(resolve => terminal.write(text, resolve));
    const enqueueWrite = operation => {
      writeQueue = writeQueue.then(operation, operation);
      return writeQueue;
    };

    terminal.open(document.getElementById('terminal'));
    enqueueWrite(() => writeAsync(emptyText));

    const postTerminalInput = data => {
      if (window.chrome?.webview) {
        window.chrome.webview.postMessage({ type: 'input', data });
      }
    };

    terminal.onData(postTerminalInput);

    window.agentmuxSetText = value => {
      const text = value || emptyText;
      return enqueueWrite(async () => {
        terminal.reset();
        hasOutput = text !== emptyText;
        await writeAsync(text);
        smokeScreenText = text;
      });
    };

    window.agentmuxAppendText = value => {
      const text = value || '';
      if (!text) {
        return;
      }

      return enqueueWrite(async () => {
        if (!hasOutput) {
          terminal.reset();
          hasOutput = true;
          smokeScreenText = '';
        }

        await writeAsync(text);
        smokeScreenText += text;
      });
    };

    window.agentmuxResize = (cols, rows) => {
      const nextCols = Math.floor(Number(cols));
      const nextRows = Math.floor(Number(rows));
      if (!Number.isFinite(nextCols) || !Number.isFinite(nextRows) || nextCols <= 0 || nextRows <= 0) {
        return false;
      }

      terminal.resize(nextCols, nextRows);
      return true;
    };

    window.agentmuxGetTextForSmoke = () => smokeScreenText;
    window.agentmuxGetGeometryForSmoke = () => ({ cols: terminal.cols, rows: terminal.rows });
    window.agentmuxEmitInputForSmoke = value => {
      const text = String(value || '');
      if (!text) {
        return false;
      }

      postTerminalInput(text);
      return true;
    };

    window.agentmuxEmitXtermInputForSmoke = value => {
      const text = String(value || '');
      if (!text || typeof terminal.input !== 'function') {
        return false;
      }

      terminal.input(text, true);
      return true;
    };

    window.agentmuxEmitSyntheticKeydownForSmoke = value => {
      const text = String(value || '');
      const key = text.length === 1 ? text : '';
      if (!key || !/^[a-z]$/i.test(key)) {
        return false;
      }

      const target = terminal.textarea || document.querySelector('.xterm-helper-textarea');
      if (!target) {
        return false;
      }

      const upper = key.toUpperCase();
      const keyCode = upper.charCodeAt(0);
      const event = new KeyboardEvent('keydown', {
        key,
        code: `Key${upper}`,
        keyCode,
        which: keyCode,
        bubbles: true,
        cancelable: true
      });
      for (const property of ['keyCode', 'which']) {
        try {
          Object.defineProperty(event, property, { get: () => keyCode });
        } catch {
          if (event[property] !== keyCode) {
            return false;
          }
        }
      }

      terminal.focus();
      target.focus();
      target.dispatchEvent(event);
      return true;
    };
  </script>
</body>
</html>
